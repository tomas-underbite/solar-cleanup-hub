<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);color:var(--color-text-primary);padding:0 0 2rem}

  .week-header{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
  .week-header h2{font-size:18px;font-weight:500;margin-bottom:4px}
  .week-header p{font-size:13px;color:var(--color-text-secondary)}

  .progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
  .progress-fill{height:100%;background:var(--color-text-success);border-radius:2px;transition:width 0.3s}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
  .stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
  .stat-num{font-size:20px;font-weight:500;line-height:1.2}
  .stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

  .day-section{margin-bottom:1.25rem}
  .day-header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);cursor:pointer;user-select:none;border:0.5px solid var(--color-border-tertiary)}
  .day-header:hover{background:var(--color-background-primary)}
  .day-header.today{border-color:var(--color-border-info);background:var(--color-background-info)}
  .day-date{font-size:12px;font-weight:500;color:var(--color-text-secondary);min-width:100px}
  .day-title{font-size:14px;font-weight:500;flex:1}
  .day-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
  .day-badge.done{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
  .day-badge.blocked{background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger)}
  .day-toggle{font-size:16px;color:var(--color-text-secondary);transition:transform 0.2s}
  .day-toggle.open{transform:rotate(180deg)}

  .tasks{padding:8px 0 0 0;display:none}
  .tasks.open{display:block}

  .task{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:var(--border-radius-md);cursor:pointer;transition:background 0.15s}
  .task:hover{background:var(--color-background-secondary)}
  .task input[type=checkbox]{width:15px;height:15px;margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:var(--color-text-primary)}
  .task-body{flex:1;min-width:0}
  .task-label{font-size:13px;line-height:1.5;color:var(--color-text-primary)}
  .task-label.done-text{text-decoration:line-through;color:var(--color-text-secondary)}
  .task-meta{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin-right:4px;font-weight:500}
  .tag-build{background:var(--color-background-info);color:var(--color-text-info)}
  .tag-asset{background:var(--color-background-warning);color:var(--color-text-warning)}
  .tag-gareth{background:var(--color-background-danger);color:var(--color-text-danger)}
  .tag-done{background:var(--color-background-success);color:var(--color-text-success)}
  .tag-claude{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)}
  .tag-rollover{background:var(--color-background-warning);color:var(--color-text-warning);border:0.5px solid var(--color-border-warning)}

  .section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-secondary);padding:8px 12px 4px;margin-top:4px}

  .blocker-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--color-background-warning);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-warning);margin-bottom:8px}
  .blocker-banner i{font-size:16px;flex-shrink:0}

  .ask-btn{display:inline-flex;align-items:center;gap:6px;margin-top:1rem;padding:8px 14px;font-size:13px;cursor:pointer;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
  .ask-btn:hover{background:var(--color-background-secondary)}
</style>

<h2 class="sr-only">Kleen Up Solar website rebuild — week plan May 11–15</h2>

<div class="week-header">
  <h2>Kleen Up Solar — website rebuild checklist</h2>
  <p>May 11 (Mon) to May 15 (Fri) &mdash; launch Friday. Today is Tuesday day 2. Yesterday's unfinished tasks are rolled into today.</p>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total tasks</div></div>
  <div class="stat"><div class="stat-num" id="s-blocked">0</div><div class="stat-label">Blocked on Gareth</div></div>
  <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Complete</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

<div id="days"></div>

<button class="ask-btn" onclick="sendPrompt('Help me work through todays blockers on the Kleen Up Solar checklist')">Work through today&rsquo;s blockers ↗</button>

    ]

let checks = {};
try{ checks = JSON.parse(localStorage.getItem('kus_checks')||'{}'); }catch(e){}

function saveChecks(){ try{localStorage.setItem('kus_checks', JSON.stringify(checks));}catch(e){} }

function buildDays(){
  const cont = document.getElementById('days');
  let totalTasks = 0, blockedCount = 0;

  DAYS.forEach((day, di)=>{
    const sec = document.createElement('div');
    sec.className='day-section';

    let dayItems = [];
    day.sections.forEach(s=>{ dayItems = dayItems.concat(s.items); });
    totalTasks += dayItems.length;
    const dayBlocked = dayItems.filter(i=>i.blocked).length;
    blockedCount += dayBlocked;
    const dayDone = dayItems.filter(i=>checks[i.id]).length;

    const hdr = document.createElement('div');
    hdr.className='day-header'+(day.today?' today':'');
    let badge = `${dayDone}/${dayItems.length}`;
    let badgeCls = dayDone===dayItems.length && dayItems.length>0 ? 'done' : (dayBlocked>0?'blocked':'');
    const todayLabel = day.today ? ' <span style="font-size:10px;font-weight:600;color:var(--color-text-info);margin-left:4px">TODAY</span>' : '';
    hdr.innerHTML=`<span class="day-date">${day.date}</span><span class="day-title">${day.title}${todayLabel}</span><span class="day-badge ${badgeCls}">${badge}</span><i class="ti ti-chevron-down day-toggle${(!day.collapsed)?' open':''}"></i>`;
    sec.appendChild(hdr);

    const tasks = document.createElement('div');
    const startOpen = day.today || (!day.collapsed && di===0);
    tasks.className='tasks'+(startOpen?' open':'');
    hdr.addEventListener('click',()=>{
      tasks.classList.toggle('open');
      hdr.querySelector('.day-toggle').classList.toggle('open');
    });

    day.sections.forEach(s=>{
      const lbl = document.createElement('div');
      lbl.className='section-label';
      lbl.textContent=s.label;
      tasks.appendChild(lbl);

      s.items.forEach(item=>{
        const t = document.createElement('div');
        t.className='task';
        const checked = !!checks[item.id];
        const tagHtml = (item.tags||[]).map(tag=>{
          const map={done:'tag-done',build:'tag-build',asset:'tag-asset',gareth:'tag-gareth',claude:'tag-claude',rollover:'tag-rollover'};
          const labels={done:'Done',build:'Build',asset:'Asset',gareth:'Needs Gareth',claude:'Claude drafts',rollover:'From Monday'};
          return `<span class="tag ${map[tag]||''}">${labels[tag]||tag}</span>`;
        }).join('');
        t.innerHTML=`<input type="checkbox" ${checked?'checked':''}><div class="task-body"><div class="task-label ${checked?'done-text':''}">${item.text}</div><div class="task-meta">${tagHtml}${item.meta?`<span style="color:var(--color-text-secondary)">${item.meta}</span>`:''}</div></div>`;
        const cb = t.querySelector('input');
        cb.addEventListener('change',()=>{
          checks[item.id]=cb.checked;
          saveChecks();
          t.querySelector('.task-label').classList.toggle('done-text',cb.checked);
          updateStats();
        });
        tasks.appendChild(t);
      });
    });

    sec.appendChild(tasks);
    cont.appendChild(sec);
  });

  document.getElementById('s-total').textContent = totalTasks;
  document.getElementById('s-blocked').textContent = blockedCount;
  updateStats();
}

function updateStats(){
  const allItems = DAYS.flatMap(d=>d.sections.flatMap(s=>s.items));
  const total = allItems.length;
  const done = allItems.filter(i=>checks[i.id]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('prog').style.width = pct+'%';
}

buildDays();
</script>
