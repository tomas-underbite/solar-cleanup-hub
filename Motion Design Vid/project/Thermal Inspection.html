<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kleen Up Solar — Thermal Drone Inspection</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #root { width: 100%; height: 100%; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useRef, useEffect, useMemo } = React;

// ─── Tweak defaults ───────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "duration": 50,
  "transitionStyle": "crossfade",
  "accentColor": "#3591cc",
  "showPrice": true,
  "showStats": true,
  "showLogos": false,
  "textSize": 100
}/*EDITMODE-END*/;

// ─── Brand ────────────────────────────────────────────────────────────────────
const NAVY  = '#0d2d4a';
const DARK  = '#060f18';
const WHITE = '#ffffff';

// ─── Scene timing config (proportional, scaled to duration) ──────────────────
// Each scene: [startFraction, endFraction] of total duration
// 8 scenes mapped across 0..1
const SCENE_FRACS = [
  [0.00, 0.10],  // S1 hook
  [0.09, 0.23],  // S2 aerial
  [0.22, 0.38],  // S3 thermal wipe
  [0.37, 0.54],  // S4 hotspot
  [0.53, 0.69],  // S5 stats
  [0.68, 0.82],  // S6 report
  [0.81, 0.94],  // S7 price
  [0.93, 1.00],  // S8 CTA
];

// Safe local-time helper: always returns 0..1, never NaN
function safeLocal(t, dur, sf, ef) {
  const span = (ef - sf) * dur;
  if (!isFinite(span) || span <= 0) return 0;
  const raw = (t - sf * dur) / span;
  return Math.max(0, Math.min(1, raw));
}

// Cross-fade overlap duration as fraction of total (how long scenes overlap)
const XFADE = 0.018; // ~1 second at 55s

// ─── Utilities ────────────────────────────────────────────────────────────────
function GridLines({ opacity = 1 }) {
  return (
    <div style={{
      position:'absolute', inset:0, pointerEvents:'none', opacity,
      backgroundImage:`linear-gradient(rgba(53,145,204,0.05) 1px, transparent 1px),
                       linear-gradient(90deg, rgba(53,145,204,0.05) 1px, transparent 1px)`,
      backgroundSize:'80px 80px',
    }}/>
  );
}

function ScanLine() {
  const t = useTime();
  const y = ((t * 120) % 100);
  return (
    <div style={{
      position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden',
    }}>
      <div style={{
        position:'absolute', left:0, right:0, top:`${y}%`,
        height:2,
        background:'linear-gradient(90deg, transparent 0%, rgba(53,145,204,0.18) 20%, rgba(53,145,204,0.35) 50%, rgba(53,145,204,0.18) 80%, transparent 100%)',
      }}/>
    </div>
  );
}

// ─── Scene wrapper: handles cross-fade in/out automatically ──────────────────
// xfadeIn/Out: duration in seconds for fade
function SceneWrap({ children, sceneOpacity, style }) {
  return (
    <div style={{
      position:'absolute', inset:0,
      opacity: sceneOpacity,
      ...style,
    }}>
      {children}
    </div>
  );
}

// Compute a scene's opacity from global time
function sceneOpacity(t, dur, [sf, ef], xfDur) {
  if (!isFinite(dur) || dur <= 0) return 0;
  const s = sf * dur;
  const e = ef * dur;
  const fadeIn  = Math.max(0.001, xfDur * dur);
  const fadeOut = Math.max(0.001, xfDur * dur);
  if (t < s || t > e) return 0;
  if (t < s + fadeIn)  return Math.max(0, Math.min(1, (t - s) / fadeIn));
  if (t > e - fadeOut) return Math.max(0, Math.min(1, (e - t) / fadeOut));
  return 1;
}

// ─── S1: Hook ─────────────────────────────────────────────────────────────────
function S1Hook({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[0];
  const local = safeLocal(t, dur, sf, ef);

  const imgScale = interpolate(local, [0,1], [1.0, 1.08], Easing.easeInOutSine);

  const tagO  = interpolate(local, [0.10, 0.28, 0.72, 0.90], [0,1,1,0]);
  const tagY  = interpolate(local, [0.10, 0.28], [20, 0], Easing.easeOutCubic);
  const h1O   = interpolate(local, [0.20, 0.38, 0.72, 0.90], [0,1,1,0]);
  const h1Y   = interpolate(local, [0.20, 0.38], [30, 0], Easing.easeOutCubic);

  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`url('assets/img1.webp')`,
        backgroundSize:'cover', backgroundPosition:'center 38%',
        transform:`scale(${imgScale})`, transformOrigin:'center 40%',
      }}/>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(6,15,24,0.55) 0%, rgba(6,15,24,0.75) 100%)' }}/>
      <div style={{
        position:'absolute', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', padding:'0 140px', textAlign:'center', gap:20,
      }}>
        <div style={{
          color: accent, fontSize: 16*fs, letterSpacing:'0.22em', fontWeight:600,
          textTransform:'uppercase', opacity:tagO, transform:`translateY(${tagY}px)`,
        }}>Kleen Up Solar · Thermal Drone Inspection</div>
        <div style={{
          color:'#fff', fontSize: 72*fs, lineHeight:1.07, fontWeight:700,
          opacity:h1O, transform:`translateY(${h1Y}px)`, textWrap:'balance',
        }}>
          Your solar asset is generating{' '}
          <em style={{ fontStyle:'italic', color: accent }}>less</em>{' '}
          than you think.
        </div>
      </div>
    </div>
  );
}

// ─── S2: Aerial overview ──────────────────────────────────────────────────────
function S2Aerial({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[1];
  const local = safeLocal(t, dur, sf, ef);

  const imgScale = interpolate(local, [0,1], [1.03, 1.11], Easing.easeInOutSine);
  const labelO = interpolate(local, [0.18, 0.34, 0.76, 0.92], [0,1,1,0]);
  const labelX = interpolate(local, [0.18, 0.34], [-30, 0], Easing.easeOutCubic);
  const count  = Math.round(interpolate(local, [0.25, 0.60], [0, 820], Easing.easeOutExpo));

  // Subtle scan overlay appears midway to hint at what's coming
  const scanO  = interpolate(local, [0.60, 0.85], [0, 0.3], Easing.easeInOutSine);
  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`url('assets/img1.webp')`,
        backgroundSize:'cover', backgroundPosition:'center 30%',
        transform:`scale(${imgScale})`, transformOrigin:'center 40%',
      }}/>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(6,15,24,0.1) 0%, rgba(6,15,24,0.65) 100%)' }}/>

      {/* Thermal hint overlay — anticipation of wipe */}
      <div style={{
        position:'absolute', inset:0, opacity:scanO,
        background:'linear-gradient(135deg, rgba(45,0,110,0.28) 0%, rgba(123,0,180,0.12) 100%)',
        mixBlendMode:'color',
      }}/>

      {/* Site label */}
      <div style={{
        position:'absolute', bottom:88, left:80,
        opacity:labelO, transform:`translateX(${labelX}px)`,
      }}>
        <div style={{
          background:accent, color:'#fff', fontSize:12*fs, letterSpacing:'0.16em',
          textTransform:'uppercase', fontWeight:600, padding:'5px 14px',
          display:'inline-block', marginBottom:10,
        }}>Live site · Goodwood, Cape Town</div>
        <div style={{ color:'#fff', fontSize:70*fs, fontWeight:700, lineHeight:1 }}>
          {count} <span style={{ fontSize:30*fs, fontWeight:400, opacity:0.6 }}>kW installed</span>
        </div>
      </div>
    </div>
  );
}

// ─── S3: Thermal wipe ─────────────────────────────────────────────────────────
function S3ThermalWipe({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[2];
  const local = safeLocal(t, dur, sf, ef);

  const wipe    = interpolate(local, [0.10, 0.55], [0, 100], Easing.easeInOutCubic);
  const labelO  = interpolate(local, [0.52, 0.66, 0.82, 0.95], [0,1,1,0]);
  const labelY  = interpolate(local, [0.52, 0.66], [18, 0], Easing.easeOutCubic);
  const imgZoom = interpolate(local, [0,1], [1.0, 1.07], Easing.easeInOutSine);
  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
      {/* "Before" — greyscale drone footage */}
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`url('assets/thermal2.webp')`,
        backgroundSize:'cover', backgroundPosition:'center',
        transform:`scale(${imgZoom})`, transformOrigin:'center',
        filter:'saturate(0.15) brightness(0.7)',
      }}/>

      {/* "After" — thermal, clipped by wipe */}
      <div style={{
        position:'absolute', inset:0,
        clipPath:`inset(0 ${100 - wipe}% 0 0)`,
      }}>
        <div style={{
          position:'absolute', inset:0,
          backgroundImage:`url('assets/DJI_0179_R.webp')`,
          backgroundSize:'cover', backgroundPosition:'center',
          transform:`scale(${imgZoom})`, transformOrigin:'center',
        }}/>
        <div style={{
          position:'absolute', inset:0,
          background:'linear-gradient(135deg, rgba(45,0,110,0.3) 0%, rgba(123,0,180,0.18) 40%, rgba(204,51,0,0.12) 100%)',
          mixBlendMode:'color',
        }}/>
      </div>

      {/* Wipe edge glow */}
      {wipe > 1 && wipe < 99 && (
        <div style={{
          position:'absolute', top:0, bottom:0,
          left:`${wipe}%`, width:4,
          background:'linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.85) 50%, transparent 100%)',
          boxShadow:'0 0 24px 6px rgba(255,255,255,0.45)',
          transform:'translateX(-50%)',
        }}/>
      )}

      {/* Dark vignette */}
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(6,15,24,0) 55%, rgba(6,15,24,0.72) 100%)' }}/>

      {/* Label */}
      <div style={{
        position:'absolute', bottom:80, left:0, right:0, textAlign:'center',
        opacity:labelO, transform:`translateY(${labelY}px)`,
      }}>
        <div style={{ color:accent, fontSize:14*fs, letterSpacing:'0.18em', textTransform:'uppercase', fontWeight:600, marginBottom:8 }}>
          Thermal imaging reveals what the eye cannot
        </div>
        <div style={{ color:'#fff', fontSize:48*fs, fontWeight:700 }}>
          Every panel. Every anomaly. Detected.
        </div>
      </div>
    </div>
  );
}

// ─── S4: Hot spot callout ─────────────────────────────────────────────────────
function S4Hotspot({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[3];
  const local = safeLocal(t, dur, sf, ef);

  const imgZoom  = interpolate(local, [0,1], [1.0, 1.10], Easing.easeInOutSine);
  const crossO   = interpolate(local, [0.22, 0.40], [0, 1], Easing.easeOutCubic);
  const crossSc  = interpolate(local, [0.22, 0.40], [1.9, 1.0], Easing.easeOutBack);
  const cardO    = interpolate(local, [0.40, 0.54, 0.80, 0.94], [0,1,1,0]);
  const cardX    = interpolate(local, [0.40, 0.54], [-20, 0], Easing.easeOutCubic);
  const pulse    = Math.sin(t * 4) * 0.5 + 0.5;
  const tempVal  = Math.round(interpolate(local, [0.40, 0.66], [20, 68], Easing.easeOutCubic));
  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`url('assets/chatgpt_render.png')`,
        backgroundSize:'cover', backgroundPosition:'center 55%',
        transform:`scale(${imgZoom})`, transformOrigin:'44% 54%',
      }}/>
      <div style={{ position:'absolute', inset:0, background:'rgba(6,15,24,0.30)' }}/>

      {/* Crosshair */}
      <div style={{
        position:'absolute', left:'43%', top:'51%',
        transform:`translate(-50%,-50%) scale(${crossSc})`,
        opacity:crossO,
      }}>
        {/* Pulse ring */}
        <div style={{
          position:'absolute', width:88, height:88, top:-44, left:-44,
          borderRadius:'50%',
          border:`2px solid rgba(255,100,0,${0.25 + pulse * 0.75})`,
          transform:`scale(${1 + pulse * 0.38})`,
        }}/>
        {/* Brackets */}
        {[
          {top:0,left:0,borderTop:'2px solid #fff',borderLeft:'2px solid #fff'},
          {top:0,right:0,borderTop:'2px solid #fff',borderRight:'2px solid #fff'},
          {bottom:0,left:0,borderBottom:'2px solid #fff',borderLeft:'2px solid #fff'},
          {bottom:0,right:0,borderBottom:'2px solid #fff',borderRight:'2px solid #fff'},
        ].map((s,i) => (
          <div key={i} style={{ position:'absolute', width:16, height:16, ...s }}/>
        ))}
        {/* Centre */}
        <div style={{
          position:'absolute', width:6, height:6, background:'#ff6400', borderRadius:'50%',
          top:'50%', left:'50%', transform:'translate(-50%,-50%)',
          boxShadow:'0 0 12px 5px rgba(255,100,0,0.55)',
        }}/>
        {/* Temp */}
        <div style={{
          position:'absolute', top:-38, left:'50%', transform:'translateX(-50%)',
          background:'rgba(255,100,0,0.92)', color:'#fff',
          fontSize:14*fs, fontWeight:700, padding:'3px 10px', borderRadius:3, whiteSpace:'nowrap',
        }}>{tempVal} °C</div>
      </div>

      {/* Info card */}
      <div style={{
        position:'absolute', left:72, bottom:88,
        opacity:cardO, transform:`translateX(${cardX}px)`,
        background:'rgba(13,45,74,0.88)', backdropFilter:'blur(10px)',
        border:'1px solid rgba(53,145,204,0.35)', padding:'20px 28px', borderRadius:4, maxWidth:360,
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
          <div style={{ width:9, height:9, borderRadius:'50%', background:'#e63000', flexShrink:0 }}/>
          <div style={{ color:'#ff8060', fontSize:12*fs, letterSpacing:'0.14em', fontWeight:700, textTransform:'uppercase' }}>
            Critical Anomaly Detected
          </div>
        </div>
        <div style={{ color:'#fff', fontSize:24*fs, fontWeight:600, marginBottom:6 }}>
          Hot spot · Panel cluster B-14
        </div>
        <div style={{ color:'rgba(255,255,255,0.58)', fontSize:13*fs, lineHeight:1.65 }}>
          Temperature delta: <strong style={{color:'#ff8060'}}>+48°C above baseline</strong><br/>
          Output loss: <strong style={{color:'#ff8060'}}>~12%</strong> on affected string
        </div>
      </div>
    </div>
  );
}

// ─── S5: Stats ────────────────────────────────────────────────────────────────
function S5Stats({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[4];
  const local = safeLocal(t, dur, sf, ef);

  const panels   = Math.round(interpolate(local, [0.12, 0.45], [0, 1248], Easing.easeOutExpo));
  const anomalies= Math.round(interpolate(local, [0.24, 0.54], [0, 3], Easing.easeOutCubic));
  const pct      = Math.round(interpolate(local, [0.36, 0.63], [0, 12], Easing.easeOutCubic));

  const stagger = (i) => interpolate(local, [0.12 + i*0.10, 0.30 + i*0.10], [0,1], Easing.easeOutCubic);
  const lineO = interpolate(local, [0.60, 0.73, 0.82, 0.95], [0,1,1,0]);
  const fs = textSize / 100;

  const StatCard = ({ value, unit, label, color, idx }) => {
    const p = stagger(idx);
    return (
      <div style={{
        flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:'32px 20px',
        background:'rgba(13,45,74,0.52)', backdropFilter:'blur(8px)',
        border:'1px solid rgba(53,145,204,0.18)', borderRadius:4,
        opacity:p, transform:`translateY(${interpolate(p,[0,1],[26,0],Easing.easeOutCubic)}px)`,
      }}>
        <div style={{ fontSize:80*fs, fontWeight:700, color: color || '#fff', lineHeight:1 }}>
          {value}<span style={{ fontSize:32*fs, fontWeight:300, opacity:0.55 }}>{unit}</span>
        </div>
        <div style={{ color:'rgba(255,255,255,0.5)', fontSize:14*fs, marginTop:10, textTransform:'uppercase', letterSpacing:'0.12em', textAlign:'center' }}>
          {label}
        </div>
      </div>
    );
  };

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
      <div style={{
        position:'absolute', inset:0,
        backgroundImage:`url('assets/img7.webp')`,
        backgroundSize:'cover', backgroundPosition:'center',
        filter:'brightness(0.22) saturate(0.15)',
      }}/>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg, rgba(6,15,24,0.88) 0%, rgba(13,45,74,0.68) 100%)' }}/>
      <GridLines />

      <div style={{
        position:'absolute', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', padding:'0 80px', gap:36,
      }}>
        <div style={{ color:'rgba(255,255,255,0.42)', fontSize:14*fs, letterSpacing:'0.2em', textTransform:'uppercase' }}>
          Inspection snapshot · 500 kW C&amp;I portfolio
        </div>
        <div style={{ display:'flex', gap:22, width:'100%' }}>
          <StatCard value={panels.toLocaleString()} unit=""   label="Panels scanned"              color="#fff"   idx={0} />
          <StatCard value={anomalies}               unit=" found" label="Anomalies detected"      color="#ff8060" idx={1} />
          <StatCard value={pct}                     unit="%"  label="Output recovered after repair" color={accent} idx={2} />
        </div>
        <div style={{ opacity:lineO, color:'#fff', fontSize:30*fs, fontWeight:500, textAlign:'center', textWrap:'balance', maxWidth:680 }}>
          Invisible degradation costs your portfolio <span style={{color:accent, fontWeight:700}}>every single day</span>.
        </div>
      </div>
    </div>
  );
}

// ─── S6: Report ───────────────────────────────────────────────────────────────
function S6Report({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[5];
  const local = safeLocal(t, dur, sf, ef);

  const cardO = interpolate(local, [0.08, 0.26], [0,1], Easing.easeOutCubic);
  const cardY = interpolate(local, [0.08, 0.26], [50, 0], Easing.easeOutCubic);
  const rowFn = (i) => interpolate(local, [0.28 + i*0.07, 0.40 + i*0.07], [0,1], Easing.easeOutCubic);
  const botO  = interpolate(local, [0.68, 0.80, 0.85, 0.96], [0,1,1,0]);
  const fs = textSize / 100;

  const ROWS = [
    { label:'Licensed pilot + thermal drone flight',   status:'✓ Included',    color:'#5ec85e' },
    { label:'AI-powered hot spot detection',           status:'✓ Included',    color:'#5ec85e' },
    { label:'SiteMark interactive photo report',       status:'✓ Included',    color:'#5ec85e' },
    { label:'5-business-day delivery SLA',             status:'✓ Guaranteed',  color:accent },
    { label:'Historical baseline data for year-on-year tracking', status:'✓ Included', color:'#5ec85e' },
  ];

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ position:'absolute', inset:0, background:`linear-gradient(135deg, ${DARK} 0%, ${NAVY} 100%)` }}/>
      <GridLines />
      <ScanLine />

      <div style={{
        position:'relative', zIndex:2,
        opacity:cardO, transform:`translateY(${cardY}px)`,
        background:'rgba(13,45,74,0.72)', backdropFilter:'blur(14px)',
        border:'1px solid rgba(53,145,204,0.32)', borderRadius:6,
        width:700, padding:'40px 50px',
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28 }}>
          <div>
            <div style={{ color:accent, fontSize:12*fs, letterSpacing:'0.16em', textTransform:'uppercase', marginBottom:6 }}>What you receive</div>
            <div style={{ color:'#fff', fontSize:34*fs, fontWeight:700 }}>Thermal Inspection Report</div>
          </div>
          <div style={{
            background:'rgba(53,145,204,0.15)', border:'1px solid rgba(53,145,204,0.28)',
            borderRadius:4, padding:'10px 18px',
            color:accent, fontWeight:700, fontSize:18*fs, letterSpacing:'0.06em',
          }}>KU</div>
        </div>

        <div style={{ display:'flex', flexDirection:'column' }}>
          {ROWS.map((r, i) => (
            <div key={i} style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'13px 0',
              borderBottom: i < ROWS.length-1 ? '1px solid rgba(255,255,255,0.06)' : 'none',
              opacity: rowFn(i),
              transform:`translateX(${interpolate(rowFn(i),[0,1],[-18,0],Easing.easeOutCubic)}px)`,
            }}>
              <div style={{ color:'rgba(255,255,255,0.72)', fontSize:15*fs }}>{r.label}</div>
              <div style={{ color:r.color, fontSize:13*fs, fontWeight:600, whiteSpace:'nowrap', marginLeft:16 }}>{r.status}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{
        position:'absolute', bottom:70, left:0, right:0, textAlign:'center',
        opacity:botO, color:'rgba(255,255,255,0.38)', fontSize:14*fs,
        letterSpacing:'0.12em', textTransform:'uppercase',
      }}>
        Powered by SiteMark · Delivered in 5 business days
      </div>
    </div>
  );
}

// ─── S7: Price ────────────────────────────────────────────────────────────────
function S7Price({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[6];
  const local = safeLocal(t, dur, sf, ef);

  const priceO  = interpolate(local, [0.10, 0.30], [0,1], Easing.easeOutCubic);
  const priceSc = interpolate(local, [0.10, 0.30], [0.55, 1.0], Easing.easeOutBack);
  const strikeO = interpolate(local, [0.35, 0.52], [0,1]);
  const lineW   = interpolate(local, [0.35, 0.60], [0, 100]);
  const ctxO    = interpolate(local, [0.52, 0.68, 0.82, 0.96], [0,1,1,0]);
  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ position:'absolute', inset:0, background:`linear-gradient(160deg, ${DARK} 0%, #091d30 100%)` }}/>
      <GridLines />

      <div style={{ position:'relative', zIndex:2, textAlign:'center', padding:'0 80px' }}>
        <div style={{ color:'rgba(255,255,255,0.38)', fontSize:14*fs, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:20 }}>
          Transparent flat-rate pricing
        </div>

        {/* Struck-out market rate */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:14, marginBottom:18, opacity:strikeO }}>
          <div style={{ color:'rgba(255,255,255,0.24)', fontSize:26*fs }}>Market rate</div>
          <div style={{ position:'relative', display:'inline-block' }}>
            <div style={{ color:'rgba(255,255,255,0.24)', fontSize:26*fs }}>R12k – R15k</div>
            <div style={{
              position:'absolute', top:'52%', left:0,
              height:2, background:'rgba(230,48,0,0.75)',
              width:`${lineW}%`, marginTop:-1,
            }}/>
          </div>
        </div>

        {/* Price */}
        <div style={{ opacity:priceO, transform:`scale(${priceSc})`, transformOrigin:'center' }}>
          <div style={{ color:'rgba(255,255,255,0.42)', fontSize:22*fs, marginBottom:4 }}>from</div>
          <div style={{ color:'#fff', fontSize:118*fs, fontWeight:700, lineHeight:1, letterSpacing:'-0.02em' }}>
            R7,500
          </div>
        </div>

        {/* Context */}
        <div style={{ opacity:ctxO, marginTop:22, color:'rgba(255,255,255,0.42)', fontSize:15*fs, lineHeight:1.75 }}>
          Per site · licensed pilot · drone flight · AI analysis · SiteMark report<br/>
          <span style={{ color:accent, fontWeight:500 }}>No hidden costs. No surprises.</span>
        </div>
      </div>
    </div>
  );
}

// ─── S8: CTA ──────────────────────────────────────────────────────────────────
function S8CTA({ accent, textSize, dur }) {
  const t = useTime();
  const [sf, ef] = SCENE_FRACS[7];
  const local = safeLocal(t, dur, sf, ef);

  const logoO  = interpolate(local, [0.10, 0.36], [0,1], Easing.easeOutCubic);
  const ctaO   = interpolate(local, [0.28, 0.54], [0,1], Easing.easeOutCubic);
  const ctaSc  = interpolate(local, [0.28, 0.54], [0.82, 1.0], Easing.easeOutBack);
  const urlO   = interpolate(local, [0.50, 0.72], [0,1]);
  const glowPulse = Math.sin(t * 1.8) * 0.15 + 0.85;
  const fs = textSize / 100;

  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
      <div style={{ position:'absolute', inset:0, background:`linear-gradient(160deg, ${NAVY} 0%, ${DARK} 60%)` }}/>
      <div style={{
        position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
        width:700, height:700, borderRadius:'50%',
        background:`radial-gradient(circle, rgba(53,145,204,${0.10 * glowPulse}) 0%, transparent 70%)`,
      }}/>
      <GridLines />

      <div style={{ position:'relative', zIndex:2, textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:30 }}>
        <div style={{ opacity:logoO }}>
          <img src="assets/img5.webp" alt="Kleen Up Solar" style={{ height:68, objectFit:'contain' }} />
        </div>
        <div style={{ opacity:ctaO, transform:`scale(${ctaSc})` }}>
          <div style={{
            background:accent, color:'#fff',
            fontSize:26*fs, fontWeight:700,
            padding:'22px 58px', borderRadius:4, letterSpacing:'0.04em',
            boxShadow:`0 0 50px rgba(53,145,204,${0.38 * glowPulse})`,
          }}>
            Get your inspection report
          </div>
        </div>
        <div style={{ opacity:urlO, color:'rgba(255,255,255,0.38)', fontSize:18*fs, letterSpacing:'0.1em' }}>
          kleenup.solar
        </div>
      </div>
    </div>
  );
}

// ─── Timestamp updater ────────────────────────────────────────────────────────
function TimestampUpdater({ dur }) {
  const t = useTime();
  useEffect(() => {
    const el = document.getElementById('video-root');
    if (el) el.setAttribute('data-screen-label', `${Math.floor(t)}s / ${dur}s`);
  });
  return null;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const {
    duration: dur,
    accentColor: accent,
    showStats,
    showPrice,
    textSize,
  } = tw;

  // Recompute scene opacities at render time via a hook-like approach —
  // we pass dur into each scene and each reads useTime() internally.
  // For the outer SceneWrap we still need to read global time.
  const GlobalOpacity = ({ children, sceneIdx }) => {
    const t = useTime();
    const [sf, ef] = SCENE_FRACS[sceneIdx];
    const span = (ef - sf) * dur;
    const op = (isFinite(span) && span > 0) ? sceneOpacity(t, dur, [sf, ef], XFADE) : 0;
    if (op <= 0) return null;
    return (
      <div style={{ position:'absolute', inset:0, opacity: op, willChange:'opacity' }}>
        {children}
      </div>
    );
  };

  return (
    <>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap'); * { font-family: 'DM Sans', Helvetica, sans-serif; }`}</style>
      <Stage
        width={1920}
        height={1080}
        duration={dur}
        background={DARK}
        id="video-root"
        data-screen-label="0s"
      >
        <TimestampUpdater dur={dur} />

        <GlobalOpacity sceneIdx={0}><S1Hook    accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>
        <GlobalOpacity sceneIdx={1}><S2Aerial  accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>
        <GlobalOpacity sceneIdx={2}><S3ThermalWipe accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>
        <GlobalOpacity sceneIdx={3}><S4Hotspot accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>
        {showStats && <GlobalOpacity sceneIdx={4}><S5Stats  accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>}
        <GlobalOpacity sceneIdx={5}><S6Report  accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>
        {showPrice && <GlobalOpacity sceneIdx={6}><S7Price  accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>}
        <GlobalOpacity sceneIdx={7}><S8CTA     accent={accent} textSize={textSize} dur={dur} /></GlobalOpacity>

        {/* Tweaks panel — lives inside Stage so it scales with the canvas */}
        <TweaksPanel>
          <TweakSection label="Timing" />
          <TweakSlider label="Duration" value={dur} min={40} max={90} step={5} unit="s"
                       onChange={(v) => setTweak('duration', v)} />

          <TweakSection label="Visual" />
          <TweakColor  label="Accent colour" value={accent}
                       onChange={(v) => setTweak('accentColor', v)} />
          <TweakSlider label="Text scale" value={textSize} min={70} max={130} step={5} unit="%"
                       onChange={(v) => setTweak('textSize', v)} />

          <TweakSection label="Scenes" />
          <TweakToggle label="Stats scene"   value={showStats}  onChange={(v) => setTweak('showStats', v)} />
          <TweakToggle label="Price reveal"  value={showPrice}  onChange={(v) => setTweak('showPrice', v)} />
        </TweaksPanel>
      </Stage>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
